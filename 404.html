<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#ff0100;--bg:#080808;--surface:#0f0f0f;
  --border:#1c1c1c;--muted:#6a6a6a;
}
html,body{height:100%}
body{
  background:var(--bg);color:#fff;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* Stars canvas */
#canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* Skyline */
.skyline{position:fixed;bottom:0;left:0;right:0;z-index:1;pointer-events:none}

/* Horizon glow */
.glow{
  position:fixed;bottom:0;left:0;right:0;height:380px;
  background:radial-gradient(ellipse 70% 50% at 50% 110%,rgba(255,1,0,0.25) 0%,transparent 65%);
  pointer-events:none;z-index:1;
}

/* Content */
.content{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:24px;
}

/* Logo */
.logo-wrap{
  position:relative;display:inline-block;margin-bottom:28px;
  animation:float 6s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-wrap img{
  width:120px;height:120px;border-radius:50%;object-fit:cover;
  border:2px solid var(--red);display:block;
  box-shadow:0 0 0 4px rgba(255,1,0,0.1),0 0 28px rgba(255,1,0,0.4),0 0 70px rgba(255,1,0,0.12);
}
.ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:1px solid transparent;
  border-top-color:var(--red);border-right-color:rgba(255,1,0,0.3);
  animation:spin 4s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* 404 number */
.num{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(110px,20vw,200px);
  letter-spacing:8px;line-height:.85;
  color:#fff;
  text-shadow:0 0 60px rgba(255,1,0,0.15);
  margin-bottom:0px;
}
.num span{
  color:var(--red);
  text-shadow:0 0 30px rgba(255,1,0,0.6),0 0 80px rgba(255,1,0,0.2);
}

.label{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(20px,4vw,32px);
  letter-spacing:4px;color:var(--muted);
  margin-bottom:16px;
}

.desc{
  font-size:14px;font-weight:300;color:#555;
  line-height:1.7;max-width:380px;margin:0 auto 40px;
}

/* Buttons */
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-home{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;background:var(--red);color:#fff;
  border-radius:3px;text-decoration:none;
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;
  box-shadow:0 0 20px rgba(255,1,0,0.3);transition:all .2s;
}
.btn-home:hover{background:#cc0000;box-shadow:0 0 32px rgba(255,1,0,0.45)}
.btn-socials{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;background:transparent;color:#aaa;
  border:1px solid var(--border);border-radius:3px;text-decoration:none;
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;
  transition:all .2s;
}
.btn-socials:hover{border-color:var(--red);color:#fff}

/* Nav brand */
.brand{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:20px 40px;
  background:rgba(8,8,8,0.8);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.brand-name{
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  letter-spacing:3px;color:#fff;text-decoration:none;
}
.brand-name span{color:var(--red)}
.accent{
  position:fixed;top:0;left:0;right:0;height:3px;
  background:var(--red);z-index:11;
  box-shadow:0 0 12px rgba(255,1,0,0.6);
}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.15);opacity:0}}
</style>
</head>

  const x = c.getContext('2d');
  let W, H, stars=[], shooters=[], lastShoot=0;
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<180;i++) stars.push({x:Math.random(),y:Math.random()*.75,r:Math.random()*1.1+.2,a:Math.random()*.6+.1,ts:Math.random()*.008+.002,td:Math.random()>.5?1:-1});
  function mkS(){ return {x:Math.random()*W*1.2-W*.1,y:Math.random()*H*.45,len:Math.random()*180+80,speed:Math.random()*12+8,angle:Math.PI/180*(Math.random()*25+12),life:0,maxLife:Math.random()*45+28,hue:Math.random()>.7?'rgba(255,80,80,':'rgba(255,255,255,'}; }
  function draw(now){
    x.clearRect(0,0,W,H);
    stars.forEach(s=>{ s.a+=s.ts*s.td; if(s.a>.82||s.a<.05)s.td*=-1; x.beginPath();x.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);x.fillStyle=`rgba(255,255,255,${s.a})`;x.fill(); });
    if(now-lastShoot>Math.random()*2500+1500){ shooters.push(mkS()); if(Math.random()>.6)shooters.push(mkS()); lastShoot=now; }
    shooters=shooters.filter(s=>s.life<s.maxLife);
    shooters.forEach(s=>{
      s.life++;s.x+=Math.cos(s.angle)*s.speed;s.y+=Math.sin(s.angle)*s.speed;
      const p=s.life/s.maxLife,fa=p<.2?p/.2:1-(p-.2)/.8;
      const tx=s.x-Math.cos(s.angle)*s.len,ty=s.y-Math.sin(s.angle)*s.len;
      const g=x.createLinearGradient(tx,ty,s.x,s.y);
      g.addColorStop(0,s.hue+'0)');g.addColorStop(.6,s.hue+(fa*.15)+')');g.addColorStop(1,s.hue+fa+')');
      x.beginPath();x.moveTo(tx,ty);x.lineTo(s.x,s.y);x.strokeStyle=g;x.lineWidth=1.5;x.stroke();
      x.beginPath();x.arc(s.x,s.y,2,0,Math.PI*2);x.fillStyle=s.hue+fa+')';x.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
